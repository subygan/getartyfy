services:
  postgresql:
    image: postgres:14.1-alpine
    ports:
      - "5433:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "5002:5000"
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
